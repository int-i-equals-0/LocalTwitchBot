<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Twitch Bot Overlay</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #media-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            background: transparent;
        }

        .immediate-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            background: transparent;
        }

        .video.media-element {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .image.media-element {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .media-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 100%;
            max-height: 100%;
            padding: 20px;
            box-sizing: border-box;
            margin: 0 auto;
            position: relative;
        }

        .media-wrapper:only-child {
            width: 100%;
            height: 100%;
            padding: 0;
        }

        .media-wrapper.position-above {
            flex-direction: column-reverse;
            gap: 15px;
        }

        .media-wrapper.position-below {
            flex-direction: column;
            gap: 15px;
        }

        .media-wrapper.position-left {
            flex-direction: row;
            gap: 15px;
        }

        .media-wrapper.position-right {
            flex-direction: row-reverse;
            gap: 15px;
        }

        .media-element {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            flex-shrink: 1;
            min-width: 0;
            min-height: 0;
        }

        .media-wrapper:only-child .media-element {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .media-wrapper.position-above,
        .media-wrapper.position-below {
            width: 100%;
            max-height: 100%;
            overflow: hidden;
        }

        .media-wrapper.position-left,
        .media-wrapper.position-right {
            height: 100%;
            max-width: 100%;
            overflow: hidden;
        }

        .media-wrapper.position-left .media-element,
        .media-wrapper.position-right .media-element {
            max-width: calc(100% - 200px);
            max-height: 100%;
            width: auto;
            height: auto;
        }

        .media-wrapper.position-above .text-element,
        .media-wrapper.position-below .text-element {
            max-width: 100%;
            word-break: break-word;
            flex-shrink: 0;
        }

        .media-wrapper.position-above .media-element,
        .media-wrapper.position-below .media-element {
            max-height: calc(100% - 100px);
            width: auto;
            height: auto;
            flex-shrink: 1;
        }

        .media-wrapper.position-overlay {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .media-wrapper.position-overlay .media-element {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .media-wrapper.position-overlay .text-element {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            white-space: nowrap;
            max-width: 90%;
            max-height: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 16px 32px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            white-space: normal;
            word-break: break-word;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-100%);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(100%);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInTop {
            from {
                opacity: 0;
                transform: translateY(-100%);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInBottom {
            from {
                opacity: 0;
                transform: translateY(100%);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .media-enter-fadeIn {
            animation: fadeIn 0.5s ease forwards;
        }

        .media-enter-fadeInLeft {
            animation: fadeInLeft 0.5s ease forwards;
        }

        .media-enter-fadeInRight {
            animation: fadeInRight 0.5s ease forwards;
        }

        .media-enter-fadeInTop {
            animation: fadeInTop 0.5s ease forwards;
        }

        .media-enter-fadeInBottom {
            animation: fadeInBottom 0.5s ease forwards;
        }

        .media-enter-scaleIn {
            animation: scaleIn 0.5s ease forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        @keyframes fadeOutLeft {
            from {
                opacity: 1;
                transform: translateX(0);
            }

            to {
                opacity: 0;
                transform: translateX(-100%);
            }
        }

        @keyframes fadeOutRight {
            from {
                opacity: 1;
                transform: translateX(0);
            }

            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }

        @keyframes fadeOutTop {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-100%);
            }
        }

        @keyframes fadeOutBottom {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(100%);
            }
        }

        @keyframes scaleOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0);
            }
        }

        .media-exit-fadeOut {
            animation: fadeOut 0.5s ease forwards;
        }

        .media-exit-fadeOutLeft {
            animation: fadeOutLeft 0.5s ease forwards;
        }

        .media-exit-fadeOutRight {
            animation: fadeOutRight 0.5s ease forwards;
        }

        .media-exit-fadeOutTop {
            animation: fadeOutTop 0.5s ease forwards;
        }

        .media-exit-fadeOutBottom {
            animation: fadeOutBottom 0.5s ease forwards;
        }

        .media-exit-scaleOut {
            animation: scaleOut 0.5s ease forwards;
        }

        .text-element {
            padding: 12px 24px;
            word-wrap: break-word;
            text-align: center;
            box-sizing: border-box;
            line-height: 1.4;
            color: #ffffff;
            font-size: 32px;
            font-weight: 700;
            font-style: normal;
            font-family: 'Segoe UI', sans-serif;
        }

        .text-element .char {
            display: inline-block;
            white-space: pre;
        }

        .media-wrapper.position-above .text-element,
        .media-wrapper.position-below .text-element {
            margin: 15px;
            max-width: calc(100% - 40px);
        }

        .media-wrapper.position-left .text-element,
        .media-wrapper.position-right .text-element {
            margin: 15px;
            max-width: 40vw;
        }

        .media-wrapper.position-overlay .text-element {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            white-space: nowrap;
            max-width: 90vw;
            max-height: 90vh;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 16px 32px;
        }

        @keyframes charBounce {

            0%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(calc(-0.25em * var(--amp, 1)));
            }

            60% {
                transform: translateY(calc(-0.125em * var(--amp, 1)));
            }
        }

        @keyframes charPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(calc(1 + 0.15 * var(--amp, 1)));
            }
        }

        @keyframes charRubberBand {
            0% {
                transform: scale(1, 1);
            }

            30% {
                transform: scale(calc(1 + 0.15 * var(--amp, 1)), calc(1 - 0.15 * var(--amp, 1)));
            }

            40% {
                transform: scale(calc(1 - 0.15 * var(--amp, 1)), calc(1 + 0.15 * var(--amp, 1)));
            }

            50% {
                transform: scale(calc(1 + 0.1 * var(--amp, 1)), calc(1 - 0.1 * var(--amp, 1)));
            }

            65% {
                transform: scale(calc(1 - 0.05 * var(--amp, 1)), calc(1 + 0.05 * var(--amp, 1)));
            }

            75% {
                transform: scale(calc(1 + 0.05 * var(--amp, 1)), calc(1 - 0.05 * var(--amp, 1)));
            }

            100% {
                transform: scale(1, 1);
            }
        }

        @keyframes charTada {
            0% {
                transform: scale(1) rotate(0deg);
            }

            10%,
            20% {
                transform: scale(calc(1 - 0.05 * var(--amp, 1))) rotate(calc(-2deg * var(--amp, 1)));
            }

            30%,
            50%,
            70%,
            90% {
                transform: scale(calc(1 + 0.08 * var(--amp, 1))) rotate(calc(2deg * var(--amp, 1)));
            }

            40%,
            60%,
            80% {
                transform: scale(calc(1 + 0.08 * var(--amp, 1))) rotate(calc(-2deg * var(--amp, 1)));
            }

            100% {
                transform: scale(1) rotate(0deg);
            }
        }

        @keyframes charWave {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(calc(-0.25em * var(--amp, 1)));
            }
        }

        @keyframes charWiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(calc(3deg * var(--amp, 1)));
            }

            50% {
                transform: rotate(0deg);
            }

            75% {
                transform: rotate(calc(-3deg * var(--amp, 1)));
            }
        }

        @keyframes charWobble {
            0% {
                transform: translateX(0) rotate(0deg);
            }

            15% {
                transform: translateX(calc(-0.125em * var(--amp, 1))) rotate(calc(-3deg * var(--amp, 1)));
            }

            30% {
                transform: translateX(calc(0.1em * var(--amp, 1))) rotate(calc(2deg * var(--amp, 1)));
            }

            45% {
                transform: translateX(calc(-0.075em * var(--amp, 1))) rotate(calc(-1.5deg * var(--amp, 1)));
            }

            60% {
                transform: translateX(calc(0.05em * var(--amp, 1))) rotate(calc(1deg * var(--amp, 1)));
            }

            75% {
                transform: translateX(calc(-0.025em * var(--amp, 1))) rotate(calc(-0.5deg * var(--amp, 1)));
            }

            100% {
                transform: translateX(0) rotate(0deg);
            }
        }

        .char-anim-bounce {
            animation: charBounce 0.6s ease both infinite;
        }

        .char-anim-pulse {
            animation: charPulse 0.6s ease both infinite;
        }

        .char-anim-rubberBand {
            animation: charRubberBand 0.8s ease both infinite;
        }

        .char-anim-tada {
            animation: charTada 0.8s ease both infinite;
        }

        .char-anim-wave {
            animation: charWave 0.6s ease both infinite;
        }

        .char-anim-wiggle {
            animation: charWiggle 0.6s ease both infinite;
        }

        .char-anim-wobble {
            animation: charWobble 0.8s ease both infinite;
        }

        .hidden {
            display: none !important;
        }

        .debug-info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #0f0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
            z-index: 99999;
            display: none;
        }

        .debug-info.visible {
            display: block;
        }
    </style>
</head>

<body>
    <div id="debug-info" class="debug-info"></div>
    <div id="media-container" class="hidden"></div>

    <script>
        const DEBUG = localStorage.getItem('overlay_debug') === 'true';
        const WS_RECONNECT_DELAY = 3000;
        const MEDIA_PAUSE_DELAY = 3000;
        const IMAGE_DURATION = 10;

        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const overlayPath = pathParts.length > 1 ? pathParts[pathParts.length - 1] : 'default';
        let overlayId = 'default';

        let ws = null;
        let reconnectTimer = null;
        let mediaQueue = [];
        let isPlaying = false;
        let audioContext = null;
        let currentMedia = null;
        let knownServerStartTime = null;
        let serverDown = false;
        let immediateZIndex = 2000;
        let activeImmediateCount = 0;

        const container = document.getElementById('media-container');
        const debugEl = document.getElementById('debug-info');

        function log(...args) {
            if (DEBUG) {
                console.log('[Overlay]', ...args);
                if (debugEl) debugEl.textContent = `[${new Date().toLocaleTimeString()}] ${args.join(' ')}`;
            }
        }
        function error(...args) {
            console.error('[Overlay]', ...args);
            if (debugEl) {
                debugEl.style.color = '#ff6b6b';
                debugEl.textContent = `❌ [${new Date().toLocaleTimeString()}] ${args.join(' ')}`;
            }
        }
        if (DEBUG) debugEl.classList.add('visible');

        async function resolveOverlayId() {
            try {
                const response = await fetch('/api/config');
                const config = await response.json();
                if (config.overlays && config.overlays.length > 0) {
                    const found = config.overlays.find(o => o.path === overlayPath);
                    if (found) {
                        overlayId = found.id;
                        log(`📋 Оверлей: "${found.name}" (id: ${found.id}, path: ${found.path})`);
                    } else {
                        log(`⚠️ Оверлей с path="${overlayPath}" не найден, используем default`);
                    }
                }
            } catch (err) {
                error('❌ Не удалось получить конфиг:', err);
            }
        }

        async function checkServerHealth() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                const resp = await fetch('/api/health', { signal: controller.signal, cache: 'no-store' });
                clearTimeout(timeoutId);
                if (!resp.ok) throw new Error('Not OK');
                const data = await resp.json();
                if (knownServerStartTime === null) {
                    knownServerStartTime = data.startTime;
                } else if (data.startTime !== knownServerStartTime) {
                    window.location.reload(); return;
                }
                if (serverDown) { window.location.reload(); return; }
                serverDown = false;
            } catch (e) {
                if (!serverDown) log('⚠️ Сервер недоступен');
                serverDown = true;
            }
        }
        function startServerMonitor() {
            setTimeout(checkServerHealth, 2000);
            setInterval(checkServerHealth, 5000);
        }

        function getMediaType(filename) {
            if (!filename) return 'unknown';
            const ext = filename.split('.').pop().toLowerCase();
            if (['mp4', 'webm', 'mov', 'avi', 'mkv', 'flv', 'm4v'].includes(ext)) return 'video';
            if (['mp3', 'wav', 'ogg', 'm4a', 'flac', 'aac', 'opus'].includes(ext)) return 'audio';
            if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'svg', 'apng'].includes(ext)) return 'image';
            return 'unknown';
        }
        function formatTime(s) {
            return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
        }

        function createAnimatedText(textContent, animationType, fontSettings, amplitude) {
            const el = document.createElement('div');
            el.className = 'text-element';
            if (fontSettings) {
                if (fontSettings.fontFamily) el.style.fontFamily = fontSettings.fontFamily;
                if (fontSettings.fontSize) el.style.fontSize = fontSettings.fontSize + 'px';
                if (fontSettings.fontWeight) el.style.fontWeight = fontSettings.fontWeight;
                if (fontSettings.fontStyle) el.style.fontStyle = fontSettings.fontStyle;
                if (fontSettings.color) el.style.color = fontSettings.color;
            }
            if (!animationType || animationType === 'none') {
                el.textContent = textContent;
                return el;
            }
            const amp = amplitude || 1;
            textContent.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.className = `char char-anim-${animationType}`;
                span.style.animationDelay = `${i * 0.05}s`;
                span.style.setProperty('--amp', amp);
                span.textContent = char;
                el.appendChild(span);
            });
            return el;
        }

        function createMediaWithText(mediaData) {
            const wrapper = document.createElement('div');
            wrapper.className = 'media-wrapper';

            const textPosition = mediaData.text?.position || 'overlay';
            const hasText = mediaData.text?.enabled && mediaData.text?.content;

            if (hasText) {
                wrapper.classList.add('position-' + textPosition);
            } else {
                wrapper.classList.add('position-overlay');
            }

            let mediaElement = null;
            if (mediaData.type === 'video') {
                mediaElement = document.createElement('video');
                mediaElement.className = 'media-element video';
                mediaElement.controls = false;
                mediaElement.autoplay = true;
                mediaElement.loop = false;
                mediaElement.muted = false;
                mediaElement.playsInline = true;
                mediaElement.volume = mediaData.volume / 100;
                mediaElement.preload = 'auto';

                mediaElement.addEventListener('loadedmetadata', () => {
                    log(`[VIDEO] Размер: ${mediaElement.videoWidth}x${mediaElement.videoHeight}, соотношение: ${(mediaElement.videoWidth / mediaElement.videoHeight).toFixed(2)}`);
                });
            } else if (mediaData.type === 'image') {
                mediaElement = document.createElement('img');
                mediaElement.className = 'media-element image';
                mediaElement.alt = '';
                mediaElement.loading = 'eager';

                mediaElement.onload = () => {
                    log(`[IMAGE] Размер: ${mediaElement.naturalWidth}x${mediaElement.naturalHeight}, соотношение: ${(mediaElement.naturalWidth / mediaElement.naturalHeight).toFixed(2)}`);
                };
            }

            if (mediaElement) {
                mediaElement.src = mediaData.src;

                if (mediaData.chromakey && mediaData.chromakey !== 'none') {
                    mediaElement.style.mixBlendMode = mediaData.chromakey;
                }
            }

            let textElement = null;
            if (hasText) {
                textElement = createAnimatedText(
                    mediaData.text.content,
                    mediaData.text.animation || 'none',
                    mediaData.text.font || null,
                    mediaData.text.animationAmplitude || 1
                );
            }

            if (hasText && textElement && mediaElement) {
                const pos = textPosition;
                if (pos === 'above') {
                    wrapper.appendChild(textElement);
                    wrapper.appendChild(mediaElement);
                } else if (pos === 'below') {
                    wrapper.appendChild(mediaElement);
                    wrapper.appendChild(textElement);
                } else if (pos === 'left') {
                    wrapper.appendChild(textElement);
                    wrapper.appendChild(mediaElement);
                } else if (pos === 'right') {
                    wrapper.appendChild(mediaElement);
                    wrapper.appendChild(textElement);
                } else {
                    wrapper.appendChild(mediaElement);
                    wrapper.appendChild(textElement);
                }
            } else if (mediaElement) {
                wrapper.appendChild(mediaElement);
                wrapper.style.width = '100%';
                wrapper.style.height = '100%';
                wrapper.style.padding = '0';
                mediaElement.style.maxWidth = '100%';
                mediaElement.style.maxHeight = '100%';
                mediaElement.style.width = 'auto';
                mediaElement.style.height = 'auto';
            } else if (textElement) {
                wrapper.appendChild(textElement);
            }

            const enterAnim = mediaData.animation?.enter;
            const enterDuration = mediaData.animation?.enterDuration || 0.5;
            if (enterAnim && enterAnim !== 'none') {
                wrapper.classList.add(`media-enter-${enterAnim}`);
                wrapper.style.animationDuration = `${enterDuration}s`;
            }

            return wrapper;
        }

        function applyExitAnimation(containerEl, exitAnim, exitDuration, onComplete) {
            if (!exitAnim || exitAnim === 'none') {
                onComplete();
                return;
            }
            const wrapper = containerEl.querySelector('.media-wrapper');
            if (wrapper) {
                wrapper.className = wrapper.className.replace(/media-enter-\S+/g, '').trim();
                wrapper.classList.add(`media-exit-${exitAnim}`);
                wrapper.style.animationDuration = `${exitDuration}s`;
                setTimeout(onComplete, exitDuration * 1000);
            } else {
                onComplete();
            }
        }

        function describeVideoError(videoEl) {
            const err = videoEl.error;
            if (!err) return 'Неизвестная ошибка';
            switch (err.code) {
                case 1: return 'Воспроизведение прервано (MEDIA_ERR_ABORTED)';
                case 2: return 'Сетевая ошибка при загрузке (MEDIA_ERR_NETWORK)';
                case 3: return 'Ошибка декодирования — возможно, неподдерживаемый кодек (H.265/HEVC). Перекодируйте в H.264 (MEDIA_ERR_DECODE)';
                case 4: return 'Формат видео не поддерживается браузером (MEDIA_ERR_SRC_NOT_SUPPORTED)';
                default: return `Код ошибки: ${err.code}, ${err.message || ''}`;
            }
        }

        async function playAudioWithWebAudio(src, volume, onFinished) {
            try {
                log('🎵 Аудио (очередь):', src);
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();
                const response = await fetch(src);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const arrayBuffer = await response.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                const gainNode = audioContext.createGain();
                gainNode.gain.value = volume / 100;
                source.connect(gainNode);
                gainNode.connect(audioContext.destination);
                currentMedia = { type: 'audio', source, gainNode };
                source.start();
                source.onended = () => {
                    log('✅ Аудио закончилось');
                    source.disconnect(); gainNode.disconnect();
                    currentMedia = null;
                    if (onFinished) onFinished();
                };
            } catch (err) {
                error('❌ Ошибка аудио:', err);
                currentMedia = null;
                if (onFinished) onFinished();
            }
        }

        async function playAudioDirect(src, volume, onEnded) {
            try {
                log('🎵 Аудио (immediate):', src);
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();
                const response = await fetch(src);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const arrayBuffer = await response.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                const gainNode = audioContext.createGain();
                gainNode.gain.value = volume / 100;
                source.connect(gainNode);
                gainNode.connect(audioContext.destination);
                source.start();
                source.onended = () => {
                    source.disconnect(); gainNode.disconnect();
                    if (onEnded) onEnded();
                };
            } catch (err) {
                error('❌ Ошибка аудио (immediate):', err);
                if (onEnded) onEnded();
            }
        }

        function finishQueuedMedia(exitAnim, exitDuration) {
            applyExitAnimation(container, exitAnim, exitDuration || 0.5, () => {
                container.classList.add('hidden');
                container.innerHTML = '';
                currentMedia = null;
                setTimeout(() => playNext(), MEDIA_PAUSE_DELAY);
            });
        }

        async function playNext() {
            if (mediaQueue.length === 0) {
                isPlaying = false;
                container.innerHTML = '';
                container.classList.add('hidden');
                currentMedia = null;
                log('⏸️ Очередь пуста');
                return;
            }

            if (activeImmediateCount > 0) {
                isPlaying = false;
                log(`⏳ Очередь ждёт завершения immediate-медиа (${activeImmediateCount} активных)`);
                return;
            }

            isPlaying = true;
            const item = mediaQueue.shift();
            currentMedia = item;
            log(`▶️ Очередь: ${item.type}: ${item.file} (осталось ${mediaQueue.length})`);

            const exitAnim = item.animation?.exit || 'none';
            const exitDuration = item.animation?.exitDuration || 0.5;

            try {
                if (item.type === 'audio') {
                    container.innerHTML = '';

                    if (item.text?.enabled && item.text?.content) {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'media-wrapper';

                        const enterAnim = item.animation?.enter;
                        const enterDur = item.animation?.enterDuration || 0.5;
                        if (enterAnim && enterAnim !== 'none') {
                            wrapper.classList.add(`media-enter-${enterAnim}`);
                            wrapper.style.animationDuration = `${enterDur}s`;
                        }

                        wrapper.appendChild(createAnimatedText(
                            item.text.content,
                            item.text.animation || 'none',
                            item.text.font || null,
                            item.text.animationAmplitude || 1
                        ));
                        container.classList.remove('hidden');
                        container.appendChild(wrapper);
                    } else {
                        container.classList.add('hidden');
                    }

                    playAudioWithWebAudio(item.src, item.volume, () => {
                        finishQueuedMedia(exitAnim, exitDuration);
                    });

                } else {
                    const element = createMediaWithText(item);
                    container.innerHTML = '';
                    container.classList.remove('hidden');
                    container.appendChild(element);

                    if (item.type === 'video') {
                        const video = element.querySelector('video');
                        if (video) {
                            let finished = false;
                            const finish = (reason) => {
                                if (finished) return;
                                finished = true;
                                log(`✅ Видео ${reason}`);
                                finishQueuedMedia(exitAnim, exitDuration);
                            };
                            video.addEventListener('ended', () => finish('закончилось'));
                            video.addEventListener('error', () => {
                                const msg = describeVideoError(video);
                                error(`❌ Ошибка видео: ${msg}`);
                                finish('ошибка');
                            });
                            video.addEventListener('loadedmetadata', () => {
                                log(`[VIDEO] ${video.videoWidth}x${video.videoHeight}, ${formatTime(video.duration)}`);
                            });
                            try {
                                await video.play();
                                log(`▶️ Видео играет (${formatTime(video.duration)})`);
                            } catch (playErr) {
                                error('❌ Видео не воспроизводится:', playErr.message);
                                if (playErr.name === 'NotSupportedError') {
                                    error('Кодек видео не поддерживается. Используйте H.264 (MP4) или VP9 (WebM).');
                                }
                                finish('play() error');
                            }
                        }
                    } else if (item.type === 'image') {
                        const duration = item.duration || IMAGE_DURATION;
                        log(`🖼️ Изображение: ${duration} сек`);
                        setTimeout(() => finishQueuedMedia(exitAnim, exitDuration), duration * 1000);
                    }
                }
            } catch (err) {
                error('❌ Ошибка:', err);
                finishQueuedMedia(exitAnim, exitDuration);
            }
        }

        function addToQueue(mediaData) {
            if (currentMedia && currentMedia.file === mediaData.file && currentMedia.type === mediaData.type) {
                log('⏭️ Дубликат (уже играет)');
                return;
            }
            mediaQueue.push(mediaData);
            log(`📥 В очередь: ${mediaData.file} (${mediaQueue.length})`);
            if (!isPlaying && activeImmediateCount === 0) playNext();
        }

        function onImmediateComplete() {
            activeImmediateCount--;
            log(`⚡ Immediate завершено (активных: ${activeImmediateCount})`);

            if (activeImmediateCount === 0 && mediaQueue.length > 0 && !isPlaying) {
                playNext();
            }
        }

        function playImmediate(mediaData) {
            activeImmediateCount++;
            log(`⚡ Немедленно: ${mediaData.type}: ${mediaData.file} (активных: ${activeImmediateCount})`);

            const exitAnim = mediaData.animation?.exit || 'none';
            const exitDuration = mediaData.animation?.exitDuration || 0.5;

            const layer = document.createElement('div');
            layer.className = 'immediate-layer';
            layer.style.zIndex = String(immediateZIndex++);
            document.body.appendChild(layer);

            function cleanup() {
                applyExitAnimation(layer, exitAnim, exitDuration, () => {
                    layer.remove();
                    onImmediateComplete();
                });
            }

            try {
                if (mediaData.type === 'audio') {
                    if (mediaData.text?.enabled && mediaData.text?.content) {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'media-wrapper';

                        const enterAnim = mediaData.animation?.enter;
                        const enterDur = mediaData.animation?.enterDuration || 0.5;
                        if (enterAnim && enterAnim !== 'none') {
                            wrapper.classList.add(`media-enter-${enterAnim}`);
                            wrapper.style.animationDuration = `${enterDur}s`;
                        }

                        wrapper.appendChild(createAnimatedText(
                            mediaData.text.content,
                            mediaData.text.animation || 'none',
                            mediaData.text.font || null,
                            mediaData.text.animationAmplitude || 1
                        ));
                        layer.appendChild(wrapper);
                    }

                    playAudioDirect(mediaData.src, mediaData.volume, cleanup);

                } else {
                    const element = createMediaWithText(mediaData);
                    layer.appendChild(element);

                    if (mediaData.type === 'video') {
                        const video = element.querySelector('video');
                        if (video) {
                            let finished = false;
                            const finish = (reason) => {
                                if (finished) return;
                                finished = true;
                                log(`✅ Видео (imm) ${reason}`);
                                cleanup();
                            };
                            video.addEventListener('ended', () => finish('закончилось'));
                            video.addEventListener('error', () => {
                                error(`❌ Видео (imm) ошибка: ${describeVideoError(video)}`);
                                finish('ошибка');
                            });
                            video.play().catch(err => {
                                error('❌ Видео (imm) не воспроизводится:', err.message);
                                finish('play() error');
                            });
                        }
                    } else if (mediaData.type === 'image') {
                        setTimeout(cleanup, (mediaData.duration || IMAGE_DURATION) * 1000);
                    }
                }
            } catch (err) {
                error('❌ Ошибка (imm):', err);
                cleanup();
            }
        }

        function handleMediaCommand(data) {
            const mediaPath = '/media/' + data.videoFile;
            const mediaType = getMediaType(data.videoFile);

            const mediaItem = {
                src: mediaPath,
                file: data.videoFile,
                type: mediaType,
                volume: data.volume || 100,
                duration: data.duration || IMAGE_DURATION,
                text: data.text || { enabled: false },
                animation: data.animation || { enter: 'none', exit: 'none', enterDuration: 0.5, exitDuration: 0.5 },
                queueMode: data.queueMode || 'queue',
                chromakey: data.chromakey || 'none'
            };

            if (mediaItem.queueMode === 'immediate') {
                playImmediate(mediaItem);
            } else {
                addToQueue(mediaItem);
            }
        }

        function clearQueue() {
            mediaQueue = [];
            if (currentMedia) {
                if (currentMedia.type === 'audio' && currentMedia.source) {
                    try { currentMedia.source.stop(); currentMedia.source.disconnect(); currentMedia.gainNode.disconnect(); } catch (e) { }
                }
                currentMedia = null;
            }
            container.innerHTML = '';
            container.classList.add('hidden');
            isPlaying = false;
            log('🧹 Очередь очищена');
        }

        function clearAll() {
            clearQueue();
            document.querySelectorAll('.immediate-layer').forEach(el => el.remove());
            activeImmediateCount = 0;
            log('🧹 Всё очищено (очередь + immediate)');
        }

        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsHost = window.location.hostname;
        const wsPort = 8080;

        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

            const wsUrl = `${wsProtocol}//${wsHost}:${wsPort}/?overlayId=${encodeURIComponent(overlayId)}&overlayPath=${encodeURIComponent(overlayPath)}`;

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    log(`✅ WS подключен (overlay: ${overlayId})`);
                    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
                    if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    ws.send(JSON.stringify({ command: 'register', overlayId, overlayPath }));
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        log('📩', data.command, data.videoFile || '');

                        if (data.command === 'playVideo') {
                            handleMediaCommand(data);
                        } else if (data.command === 'clearQueue') {
                            clearQueue();
                        } else if (data.command === 'clearAll') {
                            clearAll();
                        } else if (data.command === 'ping') {
                            if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ command: 'pong' }));
                        }
                    } catch (err) { error('❌ Ошибка WS-сообщения:', err); }
                };

                ws.onerror = () => error('❌ WS ошибка');

                ws.onclose = () => {
                    log('🔌 WS отключен');
                    if (!reconnectTimer) reconnectTimer = setTimeout(connectWebSocket, WS_RECONNECT_DELAY);
                };
            } catch (err) {
                error('❌ WS:', err);
                if (!reconnectTimer) reconnectTimer = setTimeout(connectWebSocket, WS_RECONNECT_DELAY);
            }
        }

        async function init() {
            log('🚀 Инициализация...');
            await resolveOverlayId();
            connectWebSocket();
            startServerMonitor();

            document.addEventListener('visibilitychange', () => {
                if (!document.hidden && audioContext && audioContext.state === 'suspended') audioContext.resume();
            });

            if (DEBUG) {
                const resizeObserver = new ResizeObserver(entries => {
                    for (let entry of entries) {
                        if (entry.target === container) {
                            log(`📐 Контейнер: ${entry.contentRect.width}x${entry.contentRect.height}`);
                        }
                    }
                });
                resizeObserver.observe(container);

                window.getContainerSize = () => {
                    const rect = container.getBoundingClientRect();
                    log(`Контейнер: ${rect.width}x${rect.height}`);
                    const wrapper = container.querySelector('.media-wrapper');
                    if (wrapper) {
                        const wrapperRect = wrapper.getBoundingClientRect();
                        log(`Wrapper: ${wrapperRect.width}x${wrapperRect.height}`);
                        const media = wrapper.querySelector('.media-element');
                        if (media) {
                            const mediaRect = media.getBoundingClientRect();
                            log(`Media: ${mediaRect.width}x${mediaRect.height}`);
                            if (media.tagName === 'VIDEO') {
                                log(`Video native: ${media.videoWidth}x${media.videoHeight}`);
                            }
                            if (media.tagName === 'IMG') {
                                log(`Image native: ${media.naturalWidth}x${media.naturalHeight}`);
                            }
                        }
                    }
                };
            }

            log('✅ Готово');
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();

        window.addEventListener('error', (event) => error('🌍', event.error || event.message));
        window.addEventListener('unhandledrejection', (event) => error('🌍', event.reason));
    </script>
</body>
